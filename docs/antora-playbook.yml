site:
  title: eds4jinja2 Documentation
  url: https://meaningfy-ws.github.io/eds4jinja2
  start_page: eds4jinja2::index.adoc

content:
  sources:
    - url: https://github.com/meaningfy-ws/eds4jinja2.git
      start_path: docs
      branches: [master]
      tags: []
      edit_url: false

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true

asciidoc:
  attributes:
    experimental: ''
    idprefix: ''
    idseparator: '-'
    page-pagination: ''

antora:
  extensions:
    - require: '@sntke/antora-mermaid-extension'
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs
      script_stem: header-scripts
      mermaid_initialize_options:
        start_on_load: true
    - require: '@antora/lunr-extension'
      snippet_length: 250
