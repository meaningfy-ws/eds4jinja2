schema: meaningfy

# Project context — injected (wrapped in <context>) into every artifact's instructions.
# OpenSpec's native project-context sink. The durable truth is openspec/specs/; this string
# is the orientation index.
context: |
  Repo: eds4jinja2. A library that embeds data-source specifications (RDF/SPARQL endpoints and
  tabular files) into Jinja2 templates to drive dynamic report generation. PyPI package with a
  `mkreport` CLI.
  Architecture: Cosmic-Python layers entrypoints > services > adapters > models (models is the
  pure innermost layer), enforced by import-linter (.importlinter, `make check-architecture`).
  Tooling: pip + tox + pyproject.toml (setuptools backend; NOT Poetry). Deps declared in
  pyproject.toml (no setup.py, no requirements*.txt); build with `python -m build`; tests via tox
  (py311, py312); `make` is the dev/CI interface. Target interpreters: Python 3.11 and 3.12.
  Top-level package: eds4jinja2 (no /src). Default branch: master.
  Commits: Conventional Commits (imperative, no trailing punctuation).
  Artifact vocabulary: EPIC ≡ proposal.md (Shape-Up work shape);
  PLAN ≡ design.md + tasks.md (clarity gate scores the pair ≥9/10);
  normative requirements ≡ specs/ deltas (RFC-2119 SHALL + Given/When/Then, no EARS).

# Per-artifact rules — THIN by design (only the 3 hard rules).
rules:
  proposal:
    - The EPIC MUST state an Appetite and a No-gos section (an EPIC without no-gos is unshaped).
  specs:
    - Use RFC-2119 SHALL/MUST; every requirement MUST have at least one #### Scenario (WHEN/THEN). No EARS.
  tasks:
    - The PLAN MUST cite its parent EPIC id on the first line (golden thread — cite your parent).
