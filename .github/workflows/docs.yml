name: docs

# Build the AsciiDoc/Antora site on every PR (validation), and deploy it to GitHub Pages
# on merge to master. ReadTheDocs builds the same playbook independently (.readthedocs.yml).
on:
  push:
    branches: [ master ]
    paths:
      - 'docs/**'
      - 'package.json'
      - '.github/workflows/docs.yml'
      - 'README.md'
  pull_request:
    branches: [ master ]
    paths:
      - 'docs/**'
      - 'package.json'
      - '.github/workflows/docs.yml'
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Antora site
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build the docs
        run: make build-docs
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
