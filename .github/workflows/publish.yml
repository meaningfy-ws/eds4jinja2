# Publish to PyPI on a GitHub Release, via Trusted Publishing (OIDC — no API token).
#
# One-time setup on PyPI: register a Trusted Publisher for this project pointing at
#   owner/repo:   meaningfy-ws/eds4jinja2
#   workflow:     publish.yml
#   environment:  release
# See https://docs.pypi.org/trusted-publishers/ . Until that is configured the publish job
# will fail (by design — no token fallback).
name: publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: make install-all
      - name: Run tests
        run: make test-all
      - name: Check architecture boundaries
        run: make check-architecture
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          env_vars: OS,PYTHON
          name: codecov-umbrella
          fail_ci_if_error: true

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # mint the OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true   # PEP 740 provenance attestations, signed via OIDC

  supply-chain:
    name: SBOM + signatures
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach assets to the GitHub Release
      id-token: write   # Sigstore keyless signing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Generate SBOM (CycloneDX, via Syft)
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: cyclonedx-json
          output-file: eds4jinja2-sbom.cyclonedx.json
      - name: Sign distributions (Sigstore, keyless)
        uses: sigstore/gh-action-sigstore-python@v3
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Attach SBOM and signatures to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            eds4jinja2-sbom.cyclonedx.json dist/*.sigstore* --clobber
