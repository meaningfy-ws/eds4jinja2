# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
#
# Docs are authored in AsciiDoc and built by Antora (Node), not Sphinx. ReadTheDocs builds the
# same playbook that GitHub Pages uses, so both sites are generated from one AsciiDoc source.
# Antora + the lunr search extension are installed locally from the committed package.json so the
# playbook's `require: '@antora/lunr-extension'` resolves from node_modules.

version: 2

build:
  os: ubuntu-22.04
  tools:
    nodejs: "22"
  jobs:
    install:
      - npm install
    build:
      html:
        - npx antora --fetch docs/antora-playbook.yml --to-dir $READTHEDOCS_OUTPUT/html
